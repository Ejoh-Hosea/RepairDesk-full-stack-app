name: Deploy to Render

# ─── TRIGGER ────────────────────────────────────────────────────────────────
# Manual only — GitHub → Actions → "Deploy to Render" → "Run workflow"
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for deploy (optional)"
        required: false
        default: "Manual deploy"

jobs:
  deploy:
    name: Deploy RepairDesk to Render
    runs-on: ubuntu-latest

    steps:
      # ── 1. Log deploy info ─────────────────────────────────────────────────
      - name: Log deploy info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Reason:       ${{ inputs.reason }}"
          echo "  Commit:       ${{ github.sha }}"
          echo "  Branch:       ${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 2. Checkout code ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Trigger Render deploy hook ─────────────────────────────────────
      # Render pulls the latest code from GitHub and rebuilds the service.
      # The deploy hook URL is stored as a GitHub secret — never hardcoded.
      - name: Trigger Render deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          echo "Render response: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "❌ Deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "✅ Deploy triggered — Render is building..."

      # ── 4. Wait for Render to start building ──────────────────────────────
      # Render takes ~60s to even start the build after the hook fires.
      # Polling too early just gets stale health check responses.
      - name: Wait for build to start
        run: |
          echo "Waiting 90 seconds for Render to start building..."
          sleep 90

      # ── 5. Poll health endpoint until service is live ─────────────────────
      # Render builds + deploys in ~3-5 minutes total.
      # We poll every 20s for up to 8 minutes.
      - name: Wait for service to be healthy
        run: |
          echo "Polling health endpoint..."
          MAX_ATTEMPTS=24
          ATTEMPT=0

          until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${{ secrets.RENDER_SERVICE_URL }}/api/health" || echo "000")

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — HTTP $STATUS"

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Service is healthy!"
              break
            fi

            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "❌ Service did not become healthy within 8 minutes"
              echo "Check Render dashboard logs for errors"
              exit 1
            fi

            sleep 20
          done

      # ── 6. Summary ─────────────────────────────────────────────────────────
      - name: Deploy complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment complete!"
          echo "  URL:    ${{ secrets.RENDER_SERVICE_URL }}"
          echo "  Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
