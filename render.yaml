services:
  - type: web
    name: repair-dashboard
    env: node
    region: oregon
    buildCommand: cd server && npm install && cd ../client && npm install --include=dev && npm run build && cd ..
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_TARGET
        value: render
      - key: SERVER_TZ
        value: America/New_York
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
